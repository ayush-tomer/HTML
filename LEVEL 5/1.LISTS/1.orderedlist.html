<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ordered List</title>
</head>
<body>
    <ol>
        <li>1</li>
        <ol type="A">
            <li>A</li>
            <ol type="a">
                <li>a</li>
                <ol type="I">
                    <li>I</li>
                    <ol type="i">
                        <li>i</li>
                        <li>ii</li>
                        <li>iii</li>
                    </ol>
                    <li>II</li>
                    <li>III</li>
                </ol>
                <li>b</li>
                <li>c</li>
            </ol>
            <li>B</li>
            <li>C</li>
        </ol>
        <li>2</li>
        <li>3</li>
    </ol>
</body>
</html>
