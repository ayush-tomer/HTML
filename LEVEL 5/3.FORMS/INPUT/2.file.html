<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>File</title>
</head>
<body>
    <form action="/" method="post">
        <label for="email">Username:</label>
        <input id="email" type="email" placeholder="Enter email" name="username" required><br>
        <label for="password">Password:</label>
        <input id="password" type="password" placeholder="Enter password" name="password" required><br>
        <label for="date">Date:</label>
        <input id="date" type="date" name="date" required><br>
        <label for="file">File:</label>
        <input id="file" type="file" name="file" required><br>
        <input type="submit">
    </form>
</body>
</html>
