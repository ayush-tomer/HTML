<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Area Tag</title>
</head>
<body>
    <form action="/" method="post">
        <label for="email">Username:</label>
        <input id="email" type="email" placeholder="Enter email" name="username" required><br>
        <label for="password">Password:</label>
        <input id="password" type="password" placeholder="Enter password" name="password" required><br>
        <label for="date">Date:</label>
        <input id="date" type="date" name="date" required><br>
        <label for="file">File:</label>
        <input id="file" type="file" name="file" required><br>
        <label for="color">Color:</label>
        <input id="color" type="color" name="color" required><br>
        <label for="range">Range:</label>
        <input id="range" type="range" name="range" required><br>
        <label for="button">Button:</label>
        <input id="button" type="button" name="button" value="Click Me"><br>
        <label for="male">Male:</label>
        <input id="male" type="radio" name="gender" value="Male" required><br>
        <label for="female">Female:</label>
        <input id="female" type="radio" name="gender" value="Female" required><br>
        <label for="others">Others:</label>
        <input id="others" type="radio" name="gender" value="Others" required><br>
        <label for="c">C:</label>
        <input id="c" type="checkbox" name="lang" value="C"><br>
        <label for="java">Java:</label>
        <input id="java" type="checkbox" name="lang" value="Java"><br>
        <label for="python">Python:</label>
        <input id="python" type="checkbox" name="lang" value="Python"><br>
        <label for="country">Select your Country:</label>
        <select id="country" name="country" required>
            <option value="India">India</option>
            <option value="US">US</option>
            <option value="UK">UK</option>
            <option value="Others">Others</option>
        </select><br>
        <label for="textarea">Text Area:</label>
        <textarea id="textarea" name="story" rows="10" cols="30" placeholder="Write your story here." required></textarea><br>
        <input type="submit">
    </form>
</body>
</html>
